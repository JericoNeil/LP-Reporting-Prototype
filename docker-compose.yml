services:
  n8n:
    image: n8nio/n8n:latest
    container_name: lp-reporting-assistant-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_SECURE_COOKIE=false
      - GENERIC_TIMEZONE=Europe/Paris
    volumes:
      - n8n_data:/home/node/.n8n
      - ./reports:/data/reports:ro

volumes:
  n8n_data:
